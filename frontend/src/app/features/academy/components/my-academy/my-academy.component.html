<div class="my-academy-container">
    <app-loading-spinner *ngIf="loading"></app-loading-spinner>

    <div class="content-card" *ngIf="!loading">
        <h1>Mi Academia</h1>

        <!-- Owner: Create Academy Button -->
        <div *ngIf="showCreateBtn" class="create-section">
            <i class="fas fa-university icon-lg"></i>
            <p>Parece que eres dueño, pero aún no tienes una academia registrada.</p>
            <button class="btn-create" (click)="toggleCreateForm()">
                <i class="fas fa-plus-circle"></i> Crear Academia
            </button>
        </div>

        <!-- Create Form -->
        <div *ngIf="showCreateForm" class="create-form-section">
            <div class="form-header">
                <h2>Registrar Nueva Academia</h2>
                <button class="btn-cancel" (click)="toggleCreateForm()">Cancelar</button>
            </div>

            <form (ngSubmit)="createAcademy()">
                <div class="profile-grid">
                    <div class="field editable">
                        <label>Nombre de la Academia *</label>
                        <input type="text" [(ngModel)]="newAcademy.nombre" name="nombre" placeholder="Ej: Eagle Dojo"
                            required />
                    </div>

                    <div class="field editable">
                        <label>País *</label>
                        <app-country-autocomplete name="pais" [(ngModel)]="newAcademy.pais"
                            (ngModelChange)="onCountryChange()" [paises]="paisesList" placeholder="País">
                        </app-country-autocomplete>
                    </div>

                    <div class="field editable">
                        <label>Ciudad *</label>
                        <app-country-autocomplete name="ciudad" [(ngModel)]="newAcademy.ciudad" [paises]="ciudadesList"
                            [maxLength]="ciudadMaxLength" placeholder="Ciudad">
                        </app-country-autocomplete>
                    </div>

                    <div class="field editable">
                        <label>Dirección *</label>
                        <input type="text" [(ngModel)]="newAcademy.direccion" name="direccion"
                            placeholder="Calle 123 #45-67" required />
                    </div>

                    <div class="field editable">
                        <label>Número de Contacto *</label>
                        <input type="tel" [(ngModel)]="newAcademy.numeroContacto" name="numeroContacto"
                            placeholder="+57 300 123 4567" required />
                    </div>

                    <div class="field editable">
                        <label>Link Red Social (Opcional)</label>
                        <input type="url" [(ngModel)]="newAcademy.linkRedSocial" name="linkRedSocial"
                            placeholder="https://instagram.com/..." />
                    </div>

                    <div class="field editable large">
                        <label>Descripción *</label>
                        <textarea [(ngModel)]="newAcademy.descripcion" name="descripcion" rows="3"
                            placeholder="Breve descripción..." required></textarea>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-join" [disabled]="submitting">
                        <i class="fas" [ngClass]="submitting ? 'fa-spinner fa-spin' : 'fa-save'"></i>
                        {{ submitting ? 'Guardando...' : 'Registrar Academia' }}
                    </button>
                </div>
            </form>
        </div>

        <!-- Others: Join Academy -->
        <div *ngIf="showJoinForm" class="join-section">
            <i class="fas fa-user-graduate icon-lg"></i>
            <p>Únete a una academia para comenzar tu entrenamiento.</p>

            <form (ngSubmit)="joinAcademy()">
                <div class="form-group">
                    <label>Selecciona tu Academia</label>
                    <app-searchable-select [options]="academyOptions" [(ngModel)]="academyId" name="academy"
                        placeholder="Buscar academia..."></app-searchable-select>
                </div>

                <div class="form-group" *ngIf="selectedAcademyId">
                    <label>Selecciona tu Instructor</label>
                    <app-searchable-select [options]="instructorOptions" [(ngModel)]="selectedInstructorId"
                        name="instructor" placeholder="Oscar..."></app-searchable-select>
                    <small *ngIf="instructorOptions.length === 0">No hay instructores disponibles.</small>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-join"
                        [disabled]="!selectedAcademyId || !selectedInstructorId || submitting">
                        <i class="fas" [ngClass]="submitting ? 'fa-spinner fa-spin' : 'fa-check'"></i>
                        {{ submitting ? 'Procesando...' : 'Inscribirse' }}
                    </button>
                </div>
            </form>
        </div>

        <div *ngIf="message" class="alert" [class.success]="success" [class.error]="!success">
            {{ message }}
        </div>
    </div>
</div>
