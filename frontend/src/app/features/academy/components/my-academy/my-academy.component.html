<div class="my-academy-container">
    <app-loading-spinner *ngIf="cargando"></app-loading-spinner>

    <div class="content-card" *ngIf="!cargando">
        <h1>Mi Academia</h1>

        <!-- Dueño: Botón Crear Academia -->
        <div *ngIf="mostrarBotonCrear" class="create-section">
            <i class="fas fa-university icon-lg"></i>
            <p>Parece que eres dueño, pero aún no tienes una academia registrada.</p>
            <button class="btn-create" (click)="alternarFormularioCrear()">
                <i class="fas fa-plus-circle"></i> Crear Academia
            </button>
        </div>

        <!-- Formulario de Crear -->
        <div *ngIf="mostrarFormularioCrear" class="create-form-section">
            <div class="form-header">
                <h2>Registrar Nueva Academia</h2>
                <button class="btn-cancel" (click)="alternarFormularioCrear()">Cancelar</button>
            </div>

            <form (ngSubmit)="crearAcademia()">
                <div class="profile-grid">
                    <div class="field editable">
                        <label>Nombre de la Academia *</label>
                        <input type="text" [(ngModel)]="nuevaAcademia.nombre" name="nombre" placeholder="Ej: Eagle Dojo"
                            required />
                    </div>

                    <div class="field editable">
                        <label>País *</label>
                        <app-country-autocomplete name="pais" [(ngModel)]="nuevaAcademia.pais"
                            (ngModelChange)="onCountryChange()" [paises]="paisesList" placeholder="País">
                        </app-country-autocomplete>
                    </div>

                    <div class="field editable">
                        <label>Ciudad *</label>
                        <app-country-autocomplete name="ciudad" [(ngModel)]="nuevaAcademia.ciudad"
                            [paises]="ciudadesList" [maxLength]="ciudadMaxLength" placeholder="Ciudad">
                        </app-country-autocomplete>
                    </div>

                    <div class="field editable">
                        <label>Dirección *</label>
                        <input type="text" [(ngModel)]="nuevaAcademia.direccion" name="direccion"
                            placeholder="Calle 123 #45-67" required />
                    </div>

                    <div class="field editable">
                        <label>Número de Contacto *</label>
                        <input type="tel" [(ngModel)]="nuevaAcademia.numeroContacto" name="numeroContacto"
                            placeholder="+57 300 123 4567" required />
                    </div>

                    <div class="field editable">
                        <label>Link Red Social (Opcional)</label>
                        <input type="url" [(ngModel)]="nuevaAcademia.linkRedSocial" name="linkRedSocial"
                            placeholder="https://instagram.com/..." />
                    </div>

                    <div class="field editable large">
                        <label>Descripción *</label>
                        <textarea [(ngModel)]="nuevaAcademia.descripcion" name="descripcion" rows="3"
                            placeholder="Breve descripción..." required></textarea>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-join" [disabled]="enviando">
                        <i class="fas" [ngClass]="enviando ? 'fa-spinner fa-spin' : 'fa-save'"></i>
                        {{ enviando ? 'Guardando...' : 'Registrar Academia' }}
                    </button>
                </div>
            </form>
        </div>

        <!-- Otros: Unirse a Academia -->
        <div *ngIf="mostrarFormularioUnirse" class="join-section">
            <i class="fas fa-user-graduate icon-lg"></i>
            <p>Únete a una academia para comenzar tu entrenamiento.</p>

            <form (ngSubmit)="unirseAcademia()">
                <div class="form-group">
                    <label>Selecciona tu Academia</label>
                    <app-searchable-select [options]="opcionesAcademia" [(ngModel)]="idAcademia" name="academy"
                        placeholder="Buscar academia..."></app-searchable-select>
                </div>

                <div class="form-group" *ngIf="idAcademiaSeleccionada">
                    <label>Selecciona tu Instructor</label>
                    <app-searchable-select [options]="opcionesInstructor" [(ngModel)]="idInstructorSeleccionado"
                        name="instructor" placeholder="Oscar..."></app-searchable-select>
                    <small *ngIf="opcionesInstructor.length === 0">No hay instructores disponibles.</small>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-join"
                        [disabled]="!idAcademiaSeleccionada || !idInstructorSeleccionado || enviando">
                        <i class="fas" [ngClass]="enviando ? 'fa-spinner fa-spin' : 'fa-check'"></i>
                        {{ enviando ? 'Procesando...' : 'Inscribirse' }}
                    </button>
                </div>
            </form>
        </div>

        <div *ngIf="mensaje" class="alert" [class.success]="exito" [class.error]="!exito">
            {{ mensaje }}
        </div>
    </div>
</div>
