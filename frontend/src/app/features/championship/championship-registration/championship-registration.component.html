<div class="registration-container">
    <div class="registration-card">
        <header class="header">
            <button type="button" (click)="goBack()" class="btn-back">
                <i class="fas fa-arrow-left fa-2x"></i>
            </button>
            <div class="header-text">
                <h1 *ngIf="campeonato">{{ campeonato.nombre }}</h1>
                <h1 *ngIf="!campeonato">Cargando...</h1>
                <p class="subtitle">Inscripción al Campeonato</p>
            </div>
        </header>

        <app-loading-spinner *ngIf="loading" message="Cargando información del torneo..."></app-loading-spinner>

        <div *ngIf="!loading && campeonato" class="form-content">
            <div class="alert alert-info" *ngIf="code">
                <i class="fas fa-key"></i> Has accedido con un código de invitación privado.
            </div>

            <form (ngSubmit)="submitRegistration()" #regForm="ngForm">
                <section class="form-section">
                    <div class="section-header">
                        <i class="fas fa-trophy"></i>
                        <h3>Configuración de Inscripción</h3>
                    </div>

                    <div class="row">
                        <div class="input-group full-width">
                            <label>Modalidades de competencia (Selecciona una o más)</label>
                            <div class="modalidades-grid">
                                <div *ngFor="let m of modalidadOptions" class="modalidad-card"
                                    [class.selected]="isModalidadSelected(m.value)" (click)="toggleModalidad(m.value)">
                                    <div class="checkbox-indicator">
                                        <i class="fas fa-check"></i>
                                    </div>
                                    <span class="modalidad-label">{{ m.label }}</span>
                                </div>
                            </div>
                            <small class="helper-text spaced-alert" *ngIf="registrationData.modalidades.length === 0">
                                * Selecciona al menos una opción
                            </small>
                        </div>
                        <div class="input-group" *ngIf="isFieldRequired('cinturon')">
                            <label>Confirma tu Cinturón</label>
                            <app-custom-select [options]="beltOptions" [ngModel]="registrationData.cinturon"
                                (ngModelChange)="registrationData.cinturon = $event" name="cinturon"
                                placeholder="Selecciona tu cinturón">
                            </app-custom-select>
                        </div>
                    </div>

                    <div class="row" *ngIf="isFieldRequired('peso')">
                        <div class="input-group">
                            <label>Peso Actual (kg)</label>
                            <input type="text" name="peso" [ngModel]="registrationData.peso" required
                                placeholder="Ej: 75" inputmode="numeric" maxlength="3" (input)="validateWeight($event)"
                                [class.input-error]="weightError">
                            <div *ngIf="weightError" class="field-error-msg">
                                <small>{{ weightError }}</small>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" (click)="goBack()">Cancelar</button>
                    <button type="submit" class="btn-submit"
                        [disabled]="submitting || !regForm.form.valid || registrationData.modalidades.length === 0">
                        <i class="fas" [ngClass]="submitting ? 'fa-spinner fa-spin' : 'fa-check-circle'"></i>
                        {{ submitting ? 'Procesando...' : 'Confirmar Inscripción' }}
                    </button>
                </div>

                <div *ngIf="message" class="alert" [class.alert-success]="success" [class.alert-error]="!success">
                    {{ message }}
                </div>
            </form>
        </div>
    </div>
</div>
