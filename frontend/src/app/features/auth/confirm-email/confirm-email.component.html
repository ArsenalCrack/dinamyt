<div class="login-container">

  <div class="login-card">

    <!-- Overlay de carga -->
    <app-loading-spinner *ngIf="cargando" message="Enviando código..." [fixed]="true"></app-loading-spinner>

    <!-- Overlay de redirección -->
    <app-loading-spinner *ngIf="redirigiendo" message="Redirigiendo a verificación..."
      [fixed]="true"></app-loading-spinner>

    <button type="button" (click)="volverAtras()" class="btn-back" title="Volver atrás" aria-label="Volver atrás">
      <i class="fas fa-arrow-left fa-2x" aria-hidden="true"></i>
      <span class="visually-hidden">Volver atrás</span>
    </button>

    <header class="header">

      <a routerLink="/" title="Ir a la página principal">
        <img src="assets/imgs/LogotipoNegroD.png" alt="Logo Dinamyt" class="logo-img">
      </a>
      <h2>Recuperar Cuenta</h2>
    </header>

    <div class="info-text text-center mb-4">
      <p class="text-muted">
        Ingresa tu correo electrónico asociado. Te enviaremos un código de seguridad para restablecer tu contraseña.
      </p>
    </div>

    <div *ngIf="showExpiredBanner" class="banner expired-banner">
      <p>El código anterior ha caducado. Puedes volver a solicitar uno ahora:</p>
      <button #bannerResendBtn class="btn btn-sm btn-primary" (click)="enviarCodigo()">Reenviar código</button>
    </div>

    <!-- Modal para errores del servidor -->
    <div *ngIf="mensaje && !exito" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-body">
          <i class="fas fa-exclamation-circle modal-icon error"></i>
          <div class="modal-text">{{ mensaje }}</div>
        </div>
        <button class="modal-close" (click)="closeMensaje()" aria-label="Cerrar">✕</button>
        <button class="modal-action" (click)="closeMensaje()">Cerrar</button>
      </div>
    </div>

    <form (ngSubmit)="enviarCodigo()" #emailForm="ngForm">

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <input type="email" id="email" name="email" [(ngModel)]="correo" #emailRef="ngModel" autocomplete="email"
            required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" placeholder="ejemplo@correo.com"
            [class.input-error]="emailRef.invalid && (emailRef.dirty || emailRef.touched)">

          <i class="fas fa-envelope input-icon"></i>
        </div>

        <div *ngIf="emailRef.invalid && (emailRef.dirty || emailRef.touched)" class="msg-error">
          <small *ngIf="emailRef.errors?.['required']">El correo es obligatorio.</small>
          <small *ngIf="emailRef.errors?.['pattern']">Formato inválido.</small>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="emailForm.invalid || cargando || redirigiendo">
        {{ cargando ? 'Enviando...' : 'Enviar Código' }}
      </button>

      <div class="server-msg" *ngIf="mensaje && exito" [ngClass]="{'success': true}">
        <p>
          <i class="fas fa-check-circle"></i>
          {{ mensaje }}
        </p>
      </div>

    </form>
  </div>
</div>
