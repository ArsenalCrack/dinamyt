<div class="login-container">
  <div class="login-card">

    <!-- Overlay de carga -->
    <app-loading-spinner *ngIf="cargando" [message]="textoCarga" [fixed]="true"></app-loading-spinner>

    <header class="header">
      <img src="assets/imgs/LogotipoNegroD.png" alt="Logo Dinamyt" class="logo-img">
      <h2>Verificación de Seguridad</h2>
    </header>

    <div class="info-text">
      <p class="text-muted">Hemos enviado un código de 6 dígitos a:</p>
      <p class="email-highlight">{{ emailUsuario }}</p>
      <div class="verify-timer-wrap">
        <span class="timer-label">Código válido durante:</span>
        <span class="verify-timer" [ngClass]="{ 'expired': expired, 'valid': !expired }">{{ formatRemaining() }}</span>
      </div>
    </div>

    <!-- Expiration modal: show when expiredModalVisible is true -->
    <div *ngIf="expiredModalVisible" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-body">
          <i class="fas fa-exclamation-circle modal-icon"></i>
          <div class="modal-text">El código ha caducado.</div>
        </div>
        <button class="modal-close" (click)="closeExpiredModal()">✕</button>
        <button class="modal-action" (click)="closeExpiredModal()">Cerrar</button>
      </div>
    </div>

    <!-- Code not match modal: show when code doesn't match -->
    <div *ngIf="codeNotMatchModalVisible" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-body">
          <i class="fas fa-times-circle modal-icon modal-icon-error"></i>
          <div class="modal-text">El código no coincide.</div>
        </div>
        <button class="modal-close" (click)="closeCodeNotMatchModal()">✕</button>
        <button class="modal-action modal-action-error" (click)="closeCodeNotMatchModal()">Cerrar</button>
      </div>
    </div>

    <form (ngSubmit)="verificar()" #verifyForm="ngForm">

      <div class="form-group text-center">
        <label for="codigoInput">Ingresa el Código</label>

        <input type="text" id="codigoInput" name="codigo" [(ngModel)]="codigo" #codeInput="ngModel" required
          maxlength="6" pattern="[0-9]*" inputmode="numeric" placeholder="0 0 0 0 0 0" class="input-otp"
          autocomplete="one-time-code" (input)="validateNumberInput($event)"
          [class.input-error]="codeInput.invalid && (codeInput.dirty || codeInput.touched)">

        <div *ngIf="codeInput.invalid && (codeInput.dirty || codeInput.touched)" class="msg-error-center">
          <small *ngIf="codeInput.errors?.['required']">El código es requerido.</small>
          <small *ngIf="codeInput.errors?.['pattern']">Solo números.</small>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="verifyForm.invalid || codigo.length < 6 || cargando">
        {{ cargando ? 'Verificando...' : 'Verificar Cuenta' }}
      </button>

      <div class="login-footer">
        <p class="help-text no-border">
          ¿No recibiste el código?
          <button type="button" class="link-reenviar" (click)="reenviarCodigo()"
            [disabled]="resendRemainingSeconds > 0 || cargando" aria-label="Reenviar código">
            {{ resendRemainingSeconds > 0 ? 'Reenviar código (' + resendRemainingSeconds + 's)' : 'Reenviar código' }}
          </button>
        </p>
      </div>

      <div class="server-msg" *ngIf="mensaje" [ngClass]="{'success': exito, 'error': !exito}">
        <p>
          <i class="fas" [ngClass]="exito ? 'fa-check-circle' : 'fa-exclamation-circle'"></i>
          {{ mensaje }}
        </p>
      </div>

    </form>
  </div>
</div>
