<div class="login-container">
  <div class="login-card">

    <!-- Overlay de carga -->
    <div *ngIf="cargando" class="loading-overlay">
      <i class="fas fa-spinner fa-spin spinner-icon"></i>
      <p class="loading-text">Actualizando contraseña...</p>
    </div>

    <header class="header">
      <img src="assets/imgs/LogotipoNegroD.png" alt="Logo Dinamyt" class="logo-img">
      <h2>Nueva Contraseña</h2>
    </header>

    <div class="info-text text-center mb-4">
      <p class="text-muted">Crea una nueva contraseña segura para tu cuenta.</p>
    </div>

    <form (ngSubmit)="cambiarPassword()" #resetForm="ngForm">

      <div class="form-group">
        <label for="reset-contrasena">Nueva Contraseña</label>
        <div class="password-wrapper">
          <input
            [type]="mostrarPass ? 'text' : 'password'"
            id="reset-contrasena"
            name="contrasena"
            [(ngModel)]="contrasena"
            #pass="ngModel"
            required
            minlength="8"
            pattern="(?=.*[!@#$%^&*]).{8,}"
            autocomplete="new-password"
            placeholder="Mín. 8 caracteres y 1 símbolo"
            [class.input-error]="pass.invalid && (pass.dirty || pass.touched)">

          <button type="button" class="eye-icon" (click)="mostrarPass = !mostrarPass" [attr.aria-label]="mostrarPass ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <i class="fas" [ngClass]="mostrarPass ? 'fa-eye-slash' : 'fa-eye'" aria-hidden="true"></i>
          </button>
        </div>

        <div *ngIf="pass.invalid && (pass.dirty || pass.touched)" class="msg-error">
          <small *ngIf="pass.errors?.['required']">Requerida.</small>
          <small *ngIf="pass.errors?.['minlength']">Mínimo 8 caracteres.</small>
          <small *ngIf="pass.errors?.['pattern']">Debe tener al menos un símbolo (!&#64;#$%).</small>
        </div>
      </div>

      <div class="form-group">
        <label for="reset-confirmPassword">Confirmar Contraseña</label>
        <div class="password-wrapper">
          <input
            [type]="mostrarConfirm ? 'text' : 'password'"
            id="reset-confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            #confirm="ngModel"
            required
            autocomplete="new-password"
            placeholder="Repite la contraseña"
            [class.input-error]="(confirm.invalid || confirm.value !== contrasena) && (confirm.dirty || confirm.touched)">

          <button type="button" class="eye-icon" (click)="mostrarConfirm = !mostrarConfirm" [attr.aria-label]="mostrarConfirm ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <i class="fas" [ngClass]="mostrarConfirm ? 'fa-eye-slash' : 'fa-eye'" aria-hidden="true"></i>
          </button>
        </div>

        <div *ngIf="(confirm.value !== contrasena) && (confirm.dirty || confirm.touched)" class="msg-error">
          <small>Las contraseñas no coinciden.</small>
        </div>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="resetForm.invalid || contrasena !== confirmPassword || cargando">
        {{ cargando ? 'Actualizando...' : 'Cambiar Contraseña' }}
      </button>

      <div class="server-msg" *ngIf="mensaje" [ngClass]="{'success': exito, 'error': !exito}">
        <p>
          <i class="fas" [ngClass]="exito ? 'fa-check-circle' : 'fa-exclamation-circle'"></i>
          {{ mensaje }}
        </p>
      </div>

    </form>
  </div>
</div>
