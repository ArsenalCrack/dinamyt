<div class="login-container">
  <div class="login-card">

    <button type="button" (click)="volverAtras()" class="btn-back" title="Volver atrás" aria-label="Volver atrás">
      <i class="fas fa-arrow-left fa-2x" aria-hidden="true"></i>
      <span class="visually-hidden">Volver atrás</span>
    </button>

    <!-- Overlay de carga -->
    <app-loading-spinner *ngIf="cargando" message="Iniciando sesión..." [fixed]="true"></app-loading-spinner>

    <header class="header">
      <a routerLink="/" title="Ir a la página principal">
        <img src="assets/imgs/LogotipoNegroD.png" alt="Logo Dinamyt" class="logo-img">
      </a>
      <h2>Iniciar sesión</h2>
    </header>

    <form (ngSubmit)="login()" #loginForm="ngForm">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="correo" autocomplete="email" required
          placeholder="Ingresa tu correo registrado">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>

        <div class="password-wrapper">
          <input [type]="mostrarPass ? 'text' : 'password'" id="password" name="password" [(ngModel)]="contrasena"
            autocomplete="current-password" required placeholder="Ingresa tu contraseña">

          <button type="button" class="eye-icon" (click)="mostrarPass = !mostrarPass"
            [attr.aria-label]="mostrarPass ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <i class="fas" [ngClass]="mostrarPass ? 'fa-eye-slash' : 'fa-eye'" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || cargando">
        Ingresar
      </button>

      <div class="login-footer">
        <p class="register-text">
          ¿Aún no tienes una cuenta?
          <a routerLink="/register">Regístrate</a>
        </p>

        <div class="login-sep" aria-hidden></div>

        <div class="help-block">
          <p class="help-text">¿Has olvidado tus datos?</p>
          <a routerLink="/recoverAccount" class="link-recover">Recuperar cuenta</a>
        </div>
      </div>

      <!-- Modal alert centered, blocks background until closed -->
      <div *ngIf="errorMessage" class="modal-overlay">
        <div class="modal-box">
          <div class="modal-body">
            <i class="fas fa-exclamation-circle modal-icon"></i>
            <div class="modal-text">{{ errorMessage }}</div>
          </div>
          <button class="modal-close" (click)="closeError()" aria-label="Cerrar">✕</button>
          <button class="modal-action" (click)="closeError()">Cerrar</button>
        </div>
      </div>

    </form>
  </div>
</div>
