<div class="login-container">
  <div class="login-card">

    <a (click)="volverAtras()" class="btn-back" title="Volver atrás">
      <i class="fas fa-arrow-left fa-2x"></i>
    </a>

    <header class="header">
      <a routerLink="/" title="Ir a la página principal">
        <img
          src="assets/imgs/LogotipoNegroD.png"
          alt="Logo Dinamyt"
          class="logo-img"
        >
      </a>
      <h2>Iniciar sesión</h2>
    </header>

    <form (ngSubmit)="login()" #loginForm="ngForm">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          ngModel
          required
          placeholder="Ingresa tu correo registrado">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>

        <div class="password-wrapper">
          <input
            [type]="mostrarPass ? 'text' : 'password'"
            id="password"
            name="password"
            ngModel
            required
            placeholder="Ingresa tu contraseña">

          <span class="eye-icon" (click)="mostrarPass = !mostrarPass">
            <i class="fas" [ngClass]="mostrarPass ? 'fa-eye-slash' : 'fa-eye'"></i>
          </span>
        </div>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="loginForm.invalid">
        Ingresar
      </button>

      <div class="login-footer">
        <p class="register-text">
          ¿Aún no tienes una cuenta?
          <a routerLink="/register">Regístrate</a>
        </p>

        <p class="help-text">
          ¿Has olvidado tus datos?
          <a routerLink="/recoverAccount">Recuperar cuenta</a>
        </p>
      </div>

      <p class="error-msg" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </p>

    </form>
  </div>
</div>
