<div class="login-container">
  <div class="login-card">

    <a routerLink="/" class="btn-back" title="Volver al inicio">
      <i class="fas fa-arrow-left fa-2x"></i>
    </a>

    <header class="header">
      <a routerLink="/" title="Ir a la página principal">
        <img
          src="assets/imgs/LogotipoNegroD.png"
          alt="Logo Dinamyt"
          class="logo-img"
        >
      </a>
      <h2>Iniciar sesión</h2>
    </header>

    <form (ngSubmit)="login()" #loginForm="ngForm">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          ngModel
          required
          placeholder="Ingresa tu correo registrado">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          ngModel
          required
          placeholder="Ingresa tu contraseña">
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="loginForm.invalid">
        Ingresar
      </button>

      <div class="login-footer">
        <p class="register-text">
          ¿Aún no tienes una cuenta?
          <a routerLink="/registro">Regístrate</a>
        </p>

        <p class="help-text">
          ¿Has olvidado tus datos?
          <a routerLink="/recuperar">Recuperar cuenta</a>
        </p>
      </div>

      <p class="error-msg" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </p>

    </form>
  </div>
</div>
