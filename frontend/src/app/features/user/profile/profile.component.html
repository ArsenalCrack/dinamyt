<div class="profile-wrapper">
  <a (click)="goBack()" class="btn-back" title="Volver atrás">
    <i class="fas fa-arrow-left fa-2x"></i>
  </a>

  <div *ngIf="saving" class="loading-overlay">
    <i class="fas fa-spinner fa-spin spinner-icon"></i>
    <p class="loading-text">Guardando cambios...</p>
  </div>

  <h2>Mi Perfil</h2>

  <div class="avatar-row">
    <div class="avatar" [style.backgroundImage]="(fotoPreview || fotoUrl) ? 'url(' + (fotoPreview || fotoUrl) + ')' : 'none'">
      <i *ngIf="!(fotoPreview || fotoUrl)" class="fas fa-user"></i>
    </div>
    <div class="avatar-actions">
      <label class="btn-secondary">
        <input type="file" accept="image/*" (change)="onFileChange($event)" hidden>
        Seleccionar foto
      </label>
      <button class="btn-primary" (click)="uploadPhoto()" [disabled]="!fotoFile || saving">{{ saving ? 'Subiendo...' : 'Subir' }}</button>
      <button class="btn-link" (click)="goChangePassword()">Cambiar contraseña</button>
    </div>
  </div>

  <form (ngSubmit)="saveProfile()">
    <div class="profile-grid">
      <!-- Bloqueados -->
      <div class="field disabled"><label>Nombre completo</label><p>{{ user.nombreC || '—' }}</p></div>
      <div class="field disabled"><label>Documento</label><p>{{ user.idDocumento || '—' }}</p></div>
      <div class="field disabled"><label>Fecha de nacimiento</label><p>{{ user.fechaNacimiento || '—' }}</p></div>
      <div class="field disabled"><label>Sexo</label><p>{{ user.sexo || '—' }}</p></div>
      <div class="field disabled"><label>Nacionalidad</label><p>{{ user.nacionalidad || '—' }}</p></div>

      <!-- Editables -->
      <div class="field editable">
        <label>Correo</label>
        <input type="email" [(ngModel)]="user.correo" name="correo" />
      </div>
      <div class="field editable">
        <label>Teléfono</label>
        <input type="tel" [(ngModel)]="user.numero_celular" name="numero_celular" inputmode="tel" />
      </div>
      <div class="field editable">
        <label>Cinturón/Rango</label>
        <app-custom-select
          name="cinturon_rango"
          [(ngModel)]="user.cinturon_rango"
          [options]="cinturones"
          placeholder="Selecciona tu cinturón">
        </app-custom-select>
        <p *ngIf="!user.cinturon_rango" class="no-seleccionado">No seleccionado</p>
      </div>
      <div class="field editable">
        <label>Academia</label>
        <app-custom-select
          name="academia"
          [(ngModel)]="user.academia"
          [options]="academias.concat([{ value: 'otra', label: 'Otra' }])"
          placeholder="Selecciona tu academia">
        </app-custom-select>
        <input
          *ngIf="user.academia === 'otra'"
          type="text"
          name="academiaOtra"
          [(ngModel)]="academiaOtra"
          placeholder="Especifica tu academia"
          class="input-condicional">
        <p *ngIf="!user.academia" class="no-seleccionado">No seleccionado</p>
      </div>
      <div class="field editable">
        <label>Instructor</label>
        <app-custom-select
          name="Instructor"
          [(ngModel)]="user.Instructor"
          [options]="instructores.concat([{ value: 'otro', label: 'Otro' }])"
          placeholder="Selecciona tu instructor">
        </app-custom-select>
        <input
          *ngIf="user.Instructor === 'otro'"
          type="text"
          name="instructorOtro"
          [(ngModel)]="instructorOtro"
          placeholder="Especifica tu instructor"
          class="input-condicional">
        <p *ngIf="!user.Instructor" class="no-seleccionado">No seleccionado</p>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" type="submit" [disabled]="saving">{{ saving ? 'Guardando...' : 'Guardar cambios' }}</button>
    </div>
  </form>

  <div *ngIf="message" class="alert" [class.success]="success">{{ message }}</div>
</div>
