<div class="login-container">
  <div class="login-card">

    <a (click)="goBack()" class="btn-back" title="Volver atrás">
      <i class="fas fa-arrow-left fa-2x"></i>
    </a>

    <!-- Overlay de carga -->
    <app-loading-spinner *ngIf="cargando" message="Actualizando contraseña..." [fixed]="true"></app-loading-spinner>

    <header class="header">
      <img src="assets/imgs/LogotipoNegroD.png" alt="Logo Dinamyt" class="logo-img">
      <h2>Cambiar Contraseña</h2>
    </header>

    <div class="info-text text-center mb-4">
      <p class="text-muted">Actualiza tu contraseña manteniendo tu cuenta segura.</p>
    </div>

    <!-- Modal for server messages -->
    <div *ngIf="mensaje && !exito" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-body">
          <i class="fas fa-exclamation-circle modal-icon error"></i>
          <div class="modal-text">{{ mensaje }}</div>
        </div>
        <button class="modal-close" (click)="closeMensaje()" aria-label="Cerrar">✕</button>
        <button class="modal-action" (click)="closeMensaje()">Cerrar</button>
      </div>
    </div>

    <!-- Success message (inline) -->
    <div *ngIf="mensaje && exito" class="alert alert-success">
      <i class="fas fa-check-circle"></i>
      {{ mensaje }}
    </div>

    <form (ngSubmit)="submit()" #cpForm="ngForm">
      <div class="form-group">
        <label>Contraseña actual</label>
        <div class="password-wrapper">
          <input [type]="mostrarActual ? 'text' : 'password'" name="actual" [(ngModel)]="actual" #actualCtrl="ngModel"
            required autocomplete="current-password" placeholder="Ingresa tu contraseña actual"
            [class.input-error]="actualCtrl.invalid && (actualCtrl.dirty || actualCtrl.touched)">

          <span class="eye-icon" (click)="mostrarActual = !mostrarActual">
            <i class="fas" [ngClass]="mostrarActual ? 'fa-eye-slash' : 'fa-eye'"></i>
          </span>
        </div>
        <div *ngIf="actualCtrl.invalid && (actualCtrl.dirty || actualCtrl.touched)" class="msg-error">
          <small>Requerida.</small>
        </div>
      </div>

      <div class="form-group">
        <label>Nueva Contraseña</label>
        <div class="password-wrapper">
          <input [type]="mostrarNueva ? 'text' : 'password'" name="nueva" [(ngModel)]="nueva" #nuevaCtrl="ngModel"
            required minlength="8" pattern="(?=.*[!@#$%^&*]).{8,}" autocomplete="new-password"
            placeholder="Mín. 8 caracteres y 1 símbolo"
            [class.input-error]="nuevaCtrl.invalid && (nuevaCtrl.dirty || nuevaCtrl.touched)">

          <span class="eye-icon" (click)="mostrarNueva = !mostrarNueva">
            <i class="fas" [ngClass]="mostrarNueva ? 'fa-eye-slash' : 'fa-eye'"></i>
          </span>
        </div>
        <div *ngIf="nuevaCtrl.invalid && (nuevaCtrl.dirty || nuevaCtrl.touched)" class="msg-error">
          <small *ngIf="nuevaCtrl.errors?.['required']">Requerida.</small>
          <small *ngIf="nuevaCtrl.errors?.['minlength']">Mínimo 8 caracteres.</small>
          <small *ngIf="nuevaCtrl.errors?.['pattern']">Debe tener al menos un símbolo (!&#64;#$%).</small>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmar Contraseña</label>
        <div class="password-wrapper">
          <input [type]="mostrarConfirm ? 'text' : 'password'" name="confirmar" [(ngModel)]="confirmar"
            #confirmCtrl="ngModel" required placeholder="Repite la contraseña"
            [class.input-error]="(confirmar !== nueva || confirmCtrl.invalid) && (confirmCtrl.dirty || confirmCtrl.touched)">

          <span class="eye-icon" (click)="mostrarConfirm = !mostrarConfirm">
            <i class="fas" [ngClass]="mostrarConfirm ? 'fa-eye-slash' : 'fa-eye'"></i>
          </span>
        </div>
        <div *ngIf="(confirmar !== nueva) && (confirmCtrl.dirty || confirmCtrl.touched)" class="msg-error">
          <small>Las contraseñas no coinciden.</small>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="cpForm.invalid || nueva !== confirmar || cargando">
        {{ cargando ? 'Actualizando...' : 'Cambiar Contraseña' }}
      </button>
    </form>

  </div>
</div>
