<div class="registro-wrapper">

  <div class="container">

    <!-- Botón volver -->
    <a routerLink="/" class="btn-back" title="Volver al inicio">
      <i class="fas fa-arrow-left fa-2x"></i>
    </a>

    <!-- Header -->
    <header class="header">
      <a routerLink="/" title="Ir a la página principal">
        <img
          src="assets/imgs/LogotipoNegroD.png"
          alt="Logo Dinamyt"
          class="logo-img"
        >
      </a>
      <h2>Registro de Usuario</h2>
    </header>

    <!-- Formulario -->
    <form #registroForm="ngForm" (ngSubmit)="registrar()">

      <!-- Documento -->
      <div class="form-group">
        <label>Número de documento</label>
        <input
          type="number"
          name="idDocumento"
          [(ngModel)]="idDocumento"
          required
          minlength="6"
          maxlength="15"
          placeholder="Ej: 1090..."
        >

        <small *ngIf="registroForm.submitted && registroForm.controls['documento']?.invalid">
          Mínimo 6 y máximo 15 dígitos
        </small>
      </div>

      <!-- Nombre -->
      <div class="form-group">
        <label>Nombre completo</label>
        <input
          type="text"
          name="nombreC"
          [(ngModel)]="nombreC"
          required
          placeholder="Tu nombre completo"
        >
      </div>

      <!-- Sexo -->
      <div class="form-group">
        <label>Sexo</label>
        <select name="sexo" [(ngModel)]="sexo" required>
          <option value="" disabled selected>Seleccione el sexo</option>
          <option value="Femenino">Femenino</option>
          <option value="Masculino">Masculino</option>
        </select>
      </div>

      <!-- Nacionalidad -->
      <div class="form-group">
        <label>Nacionalidad</label>
        <select name="nacionalidad" [(ngModel)]="nacionalidad" required>
          <option value="" disabled selected> Seleccione una nacionalidad </option>
                        <option value="alemania">Alemania</option>
                        <option value="argentina">Argentina</option>
                        <option value="bolivia">Bolivia</option>
                        <option value="brasil">Brasil</option>
                        <option value="canada">Canadá</option>
                        <option value="chile">Chile</option>
                        <option value="colombia">Colombia</option>
                        <option value="costa_rica">Costa Rica</option>
                        <option value="cuba">Cuba</option>
                        <option value="ecuador">Ecuador</option>
                        <option value="el_salvador">El Salvador</option>
                        <option value="espana">España</option>
                        <option value="estados_unidos">Estados Unidos</option>
                        <option value="francia">Francia</option>
                        <option value="guatemala">Guatemala</option>
                        <option value="guyana">Guyana</option>
                        <option value="haiti">Haití</option>
                        <option value="honduras">Honduras</option>
                        <option value="italia">Italia</option>
                        <option value="mexico">México</option>
                        <option value="nicaragua">Nicaragua</option>
                        <option value="panama">Panamá</option>
                        <option value="paraguay">Paraguay</option>
                        <option value="peru">Perú</option>
                        <option value="puerto_rico">Puerto Rico</option>
                        <option value="republica_dominicana">República Dominicana</option>
                        <option value="surinam">Surinam</option>
                        <option value="uruguay">Uruguay</option>
                        <option value="venezuela">Venezuela</option>
                        <option value="otro">Otro</option>
        </select>
      </div>

      <!-- Correo -->
      <div class="form-group">
        <label>Correo</label>
        <input
          type="email"
          name="correo"
          [(ngModel)]="correo"
          required
          placeholder="tucorreo@email.com"
        >
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          name="contrasena"
          [(ngModel)]="contrasena"
          required
          minlength="8"
          placeholder="Mínimo 8 caracteres"
        >
      </div>

      <!-- Confirmar -->
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input
          type="password"
          name="confirmPassword"
          ngModel
          required
          placeholder="Repite tu contraseña"
        >
      </div>

      <!-- Botón -->
      <button
        type="submit"
        class="btn-submit"
        [disabled]="registroForm.invalid">
        Registrar
      </button>

      <!-- Link login -->
      <div class="link-bottom">
        <p>
          ¿Ya tienes una cuenta?
          <a routerLink="/login">Iniciar sesión</a>
        </p>
          <span class="status">
            {{ Mensajes }}
          </span>
      </div>

    </form>

  </div>

</div>
