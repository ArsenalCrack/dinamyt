<nav class="navbar navbar-expand-lg navbar-dark bg-dark custom-navbar">
  <app-loading-spinner *ngIf="loggingOut" message="Cerrando sesión..." [fixed]="true"></app-loading-spinner>

  <div class="container-fluid">
    <div class="navbar-content">
      <!-- Logo -->
      <a class="navbar-brand" routerLink="/">
        <img src="assets/imgs/logoDHBlanco-400w.png" alt="Logo Dinamyt" class="logo-img" width="400" decoding="async">
      </a>

      <!-- Mobile Notification Bell (Visible only on < lg screens) -->
      <div class="mobile-notification-wrapper d-lg-none" *ngIf="isLoggedIn">
        <button class="notification-btn" (click)="toggleNotifications()" [class.active]="showNotifications">
          <i class="fas fa-bell"></i>
        </button>

        <div class="notification-dropdown mobile-dropdown" *ngIf="showNotifications" (click)="$event.stopPropagation()">
          <div class="notif-header">
            <h4>Notificaciones</h4>
            <button class="mark-read">Marcar leídas</button>
          </div>
          <div class="notif-body">
            <div class="notif-empty">
              <i class="fas fa-bell-slash"></i>
              <p>No tienes nuevas notificaciones</p>
            </div>
          </div>
          <div class="notif-footer">
            <a routerLink="/mis-invitaciones" (click)="closeNotifications()">Ver todas las invitaciones</a>
          </div>
        </div>
      </div>

      <!-- Toggle para móvil -->
      <button #navbarToggler class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir/cerrar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navegación -->
      <div #navbarCollapse class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" [routerLink]="isLoggedIn ? '/dashboard' : '/'" [class.active]="isPanelLinkActive()">
              {{ isLoggedIn ? 'Panel' : 'Inicio' }}
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/campeonatos" [class.active]="isChampionshipsLinkActive()">Campeonatos</a>
          </li>

        </ul>

        <!-- Sección de usuario -->
        <div class="user-actions">
          <ng-container *ngIf="!loading">
            <ng-container *ngIf="!isLoggedIn; else loggedTpl">
              <button class="btn btn-login-dark" routerLink="/login">Iniciar Sesión</button>
            </ng-container>

            <ng-template #loggedTpl>
              <div class="user-menu-wrapper">
                <button class="user-trigger" (click)="toggleUserDropdown()" [class.active]="showUserDropdown">
                  <i class="fas fa-user-circle user-icon"></i>
                  <span class="user-name">{{ username || 'Usuario' }}</span>
                  <i class="fas fa-chevron-down arrow-icon" [class.rotated]="showUserDropdown"></i>
                </button>

                <div class="user-dropdown" *ngIf="showUserDropdown" (click)="$event.stopPropagation()">
                  <div class="dropdown-header">
                    <i class="fas fa-user-circle header-icon"></i>
                    <div class="header-info">
                      <span class="header-name">{{ username || 'Usuario' }}</span>
                    </div>
                  </div>
                  <div class="dropdown-divider"></div>
                  <button class="dropdown-item" (click)="goToProfile()">
                    <i class="fas fa-user"></i>
                    <span>Mi Perfil</span>
                  </button>
                  <button class="dropdown-item" routerLink="/mi-academia" (click)="closeDropdown()">
                    <i class="fas fa-university"></i>
                    <span>Mi Academia</span>
                  </button>
                  <button class="dropdown-item" *ngIf="userType === 3" (click)="goToMyChamps()">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Mis Campeonatos</span>
                  </button>
                  <button class="dropdown-item" disabled title="Próximamente">
                    <i class="fas fa-cog"></i>
                    <span>Configuración</span>
                  </button>

                  <div class="dropdown-divider"></div>
                  <button class="dropdown-item logout-item" (click)="logout()" [disabled]="loggingOut">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Cerrar Sesión</span>
                  </button>
                </div>
              </div>

              <!-- Notification Bell (Desktop) -->
              <div class="notification-wrapper d-none d-lg-block">
                <button class="notification-btn" (click)="toggleNotifications()" [class.active]="showNotifications"
                  title="Notificaciones">
                  <i class="fas fa-bell"></i>
                  <!-- Indicador de no leídas (demo) -->
                  <!-- <span class="notification-badge"></span> -->
                </button>

                <!-- Notification Dropdown -->
                <div class="notification-dropdown" *ngIf="showNotifications" (click)="$event.stopPropagation()">
                  <div class="notif-header">
                    <h4>Notificaciones</h4>
                    <button class="mark-read">Marcar leídas</button>
                  </div>
                  <div class="notif-body">
                    <!-- Empty State for now or simple "No nuevas notificaciones" -->
                    <div class="notif-empty">
                      <i class="fas fa-bell-slash"></i>
                      <p>No tienes nuevas notificaciones</p>
                    </div>
                  </div>
                  <div class="notif-footer">
                    <a routerLink="/mis-invitaciones" (click)="closeNotifications()">Ver todas las invitaciones</a>
                  </div>
                </div>
              </div>
            </ng-template>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
</nav>
