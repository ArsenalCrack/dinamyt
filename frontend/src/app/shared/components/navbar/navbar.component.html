<nav class="navbar navbar-expand-lg navbar-dark bg-dark custom-navbar">
  <div class="container-fluid d-flex align-items-center justify-content-between">

    <a class="navbar-brand fw-bold" routerLink="/">
      <img src="assets/imgs/logoDHBlanco.png" alt="Logo Dinamyt" class="logo-img">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/campeonatos" routerLinkActive="active">Campeonatos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/ranking" routerLinkActive="active">Resultados</a>
        </li>
        <li class="nav-item" *ngIf="isLoggedIn">
          <a class="nav-link" routerLink="/perfil" routerLinkActive="active">Mi perfil</a>
        </li>
      </ul>
      <div class="d-flex ms-lg-4 justify-content-center mt-3 mt-lg-0">
        <ng-container *ngIf="!loading">
          <ng-container *ngIf="!isLoggedIn; else loggedTpl">
            <button class="btn btn-login-dark" routerLink="/login">Iniciar Sesión</button>
          </ng-container>

          <ng-template #loggedTpl>
            <div class="d-flex align-items-center gap-2">
              <span class="nav-username">Hola, {{ username || 'usuario' }}</span>
              <button class="btn btn-sm btn-logout" (click)="logout()">Cerrar sesión</button>
            </div>
          </ng-template>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
