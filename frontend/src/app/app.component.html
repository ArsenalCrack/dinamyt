<div class="container mt-5 text-center">
  <h1>Sistema DINAMYT 🥋</h1>
  <hr>
  <div class="card mx-auto" style="width: 18rem;">
    <div class="card-body">
      <h5 class="card-title">Estado del Servidor</h5>

      <h6 class="card-subtitle mb-2"
          [class.text-success]="estadoBackend === 'Online'"
          [class.text-danger]="estadoBackend !== 'Online'">
        {{ estadoBackend }}
      </h6>

      <p class="card-text">{{ mensajeBackend }}</p>
    </div>
  </div>
</div>
